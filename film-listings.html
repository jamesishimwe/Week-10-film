<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cinema Listings</title>
    <style>
      /* ── Reset & base ── */
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: system-ui, sans-serif;
        background: #0d0d1a;
        color: #f0f0f5;
        min-height: 100vh;
        padding: 2rem 1rem;
      }

      header {
        text-align: center;
        margin-bottom: 2.5rem;
      }

      header h1 {
        font-size: 2.2rem;
        letter-spacing: 0.05em;
        color: #e2c96e;
      }

      header p {
        margin-top: 0.4rem;
        color: #9090b0;
        font-size: 0.95rem;
      }

      /* ── Grid ── */
      #film-list {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
        gap: 1.5rem;
        max-width: 1100px;
        margin: 0 auto;
      }

      /* ── Card ── */
      .film-card {
        background: #1a1a2e;
        border: 1px solid #2e2e50;
        border-radius: 12px;
        padding: 1.25rem 1.5rem;
        display: flex;
        flex-direction: column;
        gap: 0.6rem;
        transition:
          transform 0.15s,
          box-shadow 0.15s;
      }

      .film-card:hover {
        transform: translateY(-4px);
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.5);
      }

      .film-card h3 {
        font-size: 1.1rem;
        color: #e2c96e;
        line-height: 1.3;
      }

      .film-card p,
      .film-card time,
      .film-card data {
        font-size: 0.875rem;
        color: #b0b0cc;
      }

      .film-card .times {
        display: flex;
        flex-wrap: wrap;
        gap: 0.4rem;
        margin-top: 0.25rem;
      }

      .film-card .times span {
        background: #2e2e50;
        border-radius: 6px;
        padding: 0.2rem 0.6rem;
        font-size: 0.8rem;
        color: #d0d0ee;
        font-variant-numeric: tabular-nums;
      }

      .film-card .badge {
        display: inline-block;
        background: #e2c96e;
        color: #0d0d1a;
        font-weight: 700;
        font-size: 0.75rem;
        border-radius: 6px;
        padding: 0.15rem 0.55rem;
        margin-top: auto;
        width: fit-content;
      }
    </style>
  </head>
  <body>
    <header>
      <h1>🎬 Now Showing</h1>
      <p>Cinema listings — rendered from data</p>
    </header>

    <main id="film-list">
      <!-- Film cards will be appended here by JavaScript -->
    </main>

    <!-- ── Step 8: Template tag ──────────────────────────────────────────── -->
    <!--
      The <template> element is invisible when the page loads.
      It is an inert fragment we can clone and populate with real data.
    -->
    <template id="film-card">
      <article class="film-card">
        <h3 data-title></h3>
        <p data-director></p>
        <time data-duration></time>
        <div class="times" data-times></div>
        <data class="badge" data-certificate></data>
      </article>
    </template>

    <script>
      // ── Step 3: Cinema data ────────────────────────────────────────────────
      const films = [
        {
          title: "Killing of Flower Moon",
          director: "Martin Scorsese",
          times: ["15:35"],
          certificate: "15",
          duration: 112,
        },
        {
          title: "Typist Artist Pirate King",
          director: "Carol Morley",
          times: ["15:00", "20:00"],
          certificate: "12A",
          duration: 108,
        },
        {
          title: "The Zone of Interest",
          director: "Jonathan Glazer",
          times: ["13:00", "18:45"],
          certificate: "15",
          duration: 105,
        },
        {
          title: "Poor Things",
          director: "Yorgos Lanthimos",
          times: ["14:20", "17:10", "21:00"],
          certificate: "18",
          duration: 141,
        },
        {
          title: "Oppenheimer",
          director: "Christopher Nolan",
          times: ["12:00", "16:30"],
          certificate: "15",
          duration: 180,
        },
        {
          title: "Past Lives",
          director: "Celine Song",
          times: ["13:30", "19:20"],
          certificate: "PG",
          duration: 106,
        },
        {
          title: "The Heroes",
          director: "Nikita",
          times: ["12:30", "19:20"],
          certificate: "PG",
          duration: 90,
        },
      ];

      // ── Step 8 + 9: Reusable component using <template> ───────────────────
      //
      //  createFilmCard(film) → DocumentFragment
      //
      //  1. Clone the hidden <template> tag (deep clone = true).
      //  2. Fill in each element using the data-* attributes as selectors.
      //  3. Return the populated fragment (do NOT append here — keep it pure).
      //
      const template = document.getElementById("film-card");

      const createFilmCard = ({
        title,
        director,
        times,
        certificate,
        duration,
      }) => {
        const card = template.content.cloneNode(true);

        card.querySelector("[data-title]").textContent = title;
        card.querySelector("[data-director]").textContent =
          `Director: ${director}`;
        card.querySelector("[data-duration]").textContent = `${duration} min`;
        card.querySelector("[data-certificate]").textContent = certificate;

        // Render each showtime as a <span> inside the times container
        const timesContainer = card.querySelector("[data-times]");
        for (const time of times) {
          const span = document.createElement("span");
          span.textContent = time;
          timesContainer.append(span);
        }

        return card;
      };

      // ── Step 11 + 12: Use map to build the list, then append ──────────────
      //
      //  films.map(createFilmCard) creates a new array where every film object
      //  is replaced by its corresponding card fragment — a one-to-one mapping.
      //
      const filmCards = films.map(createFilmCard);

      const filmList = document.getElementById("film-list");
      filmList.append(...filmCards);
    </script>
  </body>
</html>
